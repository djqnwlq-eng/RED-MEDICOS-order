<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맞춤형 화장품 발주 | 레드메디코스</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --t: #1D9E75; --tl: #E1F5EE; --tm: #9FE1CB; --td: #085041; --tmd: #0F6E56;
  --al: #FAEEDA; --ad: #633806; --am: #EF9F27;
  --bl: #E6F1FB; --bd: #0C447C;
  --ge: #e8eaed; --gf: #f7f8fa; --g6: #6b7280; --g3: #374151; --g1: #111827;
  --r: 12px; --rsm: 8px; --rlg: 16px;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--gf); color: var(--g1); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ─── API KEY SCREEN ─── */
#apiScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 1.5rem; background: linear-gradient(135deg, #f0fdf9 0%, #f7f8fa 60%);
}
.api-box {
  background: #fff; border-radius: var(--rlg); padding: 2.5rem 2rem;
  max-width: 420px; width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,.07); border: 0.5px solid var(--ge);
}
.api-brand { font-size: 11px; font-weight: 700; color: var(--t); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px; }
.api-box h1 { font-size: 22px; font-weight: 700; color: var(--g1); margin-bottom: 6px; line-height: 1.3; }
.api-box > p { font-size: 13px; color: var(--g6); line-height: 1.6; margin-bottom: 1.5rem; }
.field-label { display: block; font-size: 11px; font-weight: 700; color: var(--g6); margin-bottom: 4px; letter-spacing: .03em; }
.field-hint { font-size: 11px; color: #c8cad0; margin-top: 4px; margin-bottom: 12px; }
.inp { width: 100%; border: 1px solid var(--ge); border-radius: var(--rsm); padding: 10px 13px; font-size: 14px; font-family: inherit; color: var(--g1); background: #fff; transition: border-color .15s, box-shadow .15s; }
.inp:focus { outline: none; border-color: var(--t); box-shadow: 0 0 0 3px rgba(29,158,117,.1); }
.btn-full { width: 100%; padding: 11px; border-radius: var(--rsm); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .15s; border: none; }
.btn-primary { background: var(--t); color: #fff; }
.btn-primary:hover { background: var(--tmd); }
.btn-ghost { background: transparent; color: var(--g6); border: 1px solid var(--ge) !important; margin-top: 8px; }
.btn-ghost:hover { background: var(--gf); }
.or-divider { height: 1px; background: var(--ge); margin: 12px 0; position: relative; }
.or-divider span { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #fff; padding: 0 8px; font-size: 11px; color: #c8cad0; }

/* ─── MAIN LAYOUT ─── */
#mainApp { display: none; }
.topbar {
  background: #fff; border-bottom: 0.5px solid var(--ge); padding: 0 1.5rem;
  height: 52px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 20;
}
.topbar-brand { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--g1); }
.topbar-brand em { font-style: normal; font-size: 11px; font-weight: 400; color: var(--g6); padding: 2px 8px; border: 0.5px solid var(--ge); border-radius: 20px; }
.topbar-actions { display: flex; gap: 6px; }
.btn-sm { padding: 6px 12px; border-radius: var(--rsm); font-size: 12px; font-weight: 500; font-family: inherit; cursor: pointer; border: 0.5px solid var(--ge); background: #fff; color: var(--g6); transition: all .15s; }
.btn-sm:hover { border-color: var(--t); color: var(--t); }
.wrap { max-width: 660px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

/* ─── PROGRESS BAR ─── */
.progress {
  display: flex; align-items: flex-start; padding: 1.1rem .875rem .75rem;
  background: #fff; border-radius: var(--r); border: 0.5px solid var(--ge); margin-bottom: 1.25rem;
}
.pdot { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
.pcircle {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid #c8cad0; background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #c8cad0; transition: all .2s;
}
.pcircle.done { background: var(--tm); border-color: var(--tm); color: var(--td); }
.pcircle.active { background: var(--t); border-color: var(--t); color: #fff; }
.plabel { font-size: 9.5px; color: #c8cad0; text-align: center; line-height: 1.3; transition: color .2s; }
.plabel.active { color: var(--tmd); font-weight: 700; }
.pline { flex: 1; height: 1.5px; background: var(--ge); margin-top: -15px; transition: background .2s; }
.pline.done { background: var(--tm); }

/* ─── CARDS ─── */
.card { background: #fff; border-radius: var(--r); border: 0.5px solid var(--ge); padding: 1.25rem 1.25rem 1rem; margin-bottom: .875rem; }
.card-title { font-size: 15px; font-weight: 700; color: var(--g1); margin-bottom: 4px; }
.card-sub { font-size: 13px; color: var(--g6); line-height: 1.6; margin-bottom: 1rem; }
.section-tag { font-size: 10px; font-weight: 800; color: #c8cad0; letter-spacing: .1em; text-transform: uppercase; margin: .875rem 0 .5rem; }

/* ─── FORM ELEMENTS ─── */
textarea {
  width: 100%; border: 1px solid var(--ge); border-radius: var(--rsm);
  padding: 11px 13px; font-size: 13px; font-family: inherit; resize: vertical;
  min-height: 90px; color: var(--g1); background: #fff; line-height: 1.6;
  transition: border-color .15s, box-shadow .15s;
}
textarea:focus { outline: none; border-color: var(--t); box-shadow: 0 0 0 3px rgba(29,158,117,.1); }
select, input[type="number"] {
  width: 100%; border: 1px solid var(--ge); border-radius: var(--rsm);
  padding: 9px 13px; font-size: 13px; font-family: inherit; color: var(--g1); background: #fff;
  transition: border-color .15s;
}
select:focus, input[type="number"]:focus { outline: none; border-color: var(--t); }
.form-label { font-size: 11px; font-weight: 700; color: var(--g6); display: block; margin-bottom: 4px; }
.form-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 440px) { .form-2 { grid-template-columns: 1fr; } }

/* ─── CHIPS ─── */
.chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: .75rem; }
.chip {
  padding: 6px 13px; border-radius: 20px; border: 1px solid var(--ge);
  font-size: 12px; cursor: pointer; color: var(--g6); background: #fff;
  transition: all .15s; user-select: none; line-height: 1.4;
}
.chip:hover { border-color: var(--t); color: var(--tmd); background: var(--tl); }
.chip.sel { background: var(--tl); border-color: var(--t); color: var(--td); font-weight: 600; }
.chip.disabled { opacity: .3; cursor: not-allowed; pointer-events: none; border-style: dashed; }
.chip.ai-rec::before { content: "AI "; font-size: 9px; color: var(--t); font-weight: 800; }

/* ─── SELECTION GRIDS ─── */
.formula-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: .75rem; }
@media (max-width: 420px) { .formula-grid { grid-template-columns: repeat(2, 1fr); } }
.body-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: .75rem; }
.container-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; margin-bottom: .75rem; }
@media (max-width: 420px) { .body-grid { grid-template-columns: repeat(2, 1fr); } }

.sel-card {
  border: 1px solid var(--ge); border-radius: var(--r); padding: 14px 10px;
  cursor: pointer; text-align: center; background: #fff; transition: all .15s;
}
.sel-card:hover { border-color: var(--t); background: var(--tl); }
.sel-card.active { border: 2px solid var(--t); background: var(--tl); }
.sel-card.disabled { opacity: .3; cursor: not-allowed; pointer-events: none; border-style: dashed; }
.sel-card .sc-icon { font-size: 22px; margin-bottom: 6px; }
.sel-card .sc-name { font-size: 12px; font-weight: 700; color: var(--g3); margin-bottom: 2px; }
.sel-card .sc-desc { font-size: 10px; color: var(--g6); line-height: 1.4; }
.sel-card.active .sc-name, .sel-card.active .sc-desc { color: var(--td); }


/* ─── FORMULA SUB OPTIONS ─── */
.formula-sub-area {
  margin-top: 12px; padding: 14px 16px;
  background: var(--gf); border-radius: var(--r); border: 1px solid var(--ge);
  animation: subSlide .2s ease;
}
@keyframes subSlide { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
.formula-sub-label { font-size: 11px; font-weight: 700; color: var(--g6); margin-bottom: 8px; }
.formula-sub-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.sub-chip {
  padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--ge); background: #fff; color: var(--g3);
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.sub-chip:hover { border-color: var(--t); color: var(--t); }
.sub-chip.active { border-color: var(--t); background: var(--t); color: #fff; }
.sc-badge { font-size: 9px; color: #dc2626; margin-top: 2px; }

/* ─── FUNCTION CHECKBOXES ─── */
.fn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: .875rem; }
.fn-label {
  display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--g3);
  cursor: pointer; padding: 6px 12px; border: 1px solid var(--ge); border-radius: 20px;
  transition: all .15s;
}
.fn-label:hover { border-color: var(--t); color: var(--td); }
.fn-label.checked { background: var(--tl); border-color: var(--t); color: var(--td); }
.fn-label input[type="checkbox"] { accent-color: var(--t); width: 13px; height: 13px; }

/* ─── INFO BOXES ─── */
.price-bar {
  background: var(--tl); border-radius: var(--rsm); padding: 12px 15px;
  display: flex; justify-content: space-between; align-items: center;
  margin-top: .875rem; border: 0.5px solid var(--tm);
}
.pb-label { font-size: 12px; color: var(--tmd); font-weight: 600; }
.pb-sub { font-size: 11px; color: var(--tm); margin-top: 2px; }
.pb-price { font-size: 22px; font-weight: 800; color: var(--t); }
.notice { border-radius: var(--rsm); padding: 10px 13px; font-size: 12px; line-height: 1.55; margin-top: .75rem; }
.notice.info { background: var(--tl); color: var(--tmd); border: 0.5px solid var(--tm); }
.notice.warn { background: var(--al); color: var(--ad); border: 0.5px solid var(--am); display: none; }
.notice.warn.show { display: block; }
.notice.blue { background: var(--bl); color: var(--bd); border: 0.5px solid #B5D4F4; }

/* ─── AI LOADING ─── */
.ai-loading { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--tmd); padding: 8px 0; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--tm); border-top-color: var(--t); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── NAV BUTTONS ─── */
.btn-row { display: flex; gap: 8px; margin-top: 1.25rem; }
.btn { padding: 10px 18px; border-radius: var(--rsm); border: 1px solid var(--ge); font-size: 13px; font-weight: 600; cursor: pointer; background: #fff; color: var(--g6); font-family: inherit; transition: all .15s; }
.btn:hover { background: var(--gf); border-color: #c8cad0; }
.btn.primary { background: var(--t); border-color: var(--t); color: #fff; }
.btn.primary:hover { background: var(--tmd); }
.btn.primary:disabled, .btn.primary[disabled] { opacity: .38; cursor: not-allowed; }

/* ─── SUMMARY TABLE ─── */
.summary-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 9px 0; border-bottom: 0.5px solid #f1f3f5; font-size: 13px; gap: 1rem;
}
.summary-row:last-child { border: none; }
.sum-key { color: var(--g6); flex-shrink: 0; min-width: 80px; }
.sum-val { color: var(--g1); text-align: right; font-weight: 600; line-height: 1.5; }

/* ─── SUCCESS ─── */
.success-screen { text-align: center; padding: 4rem 1rem; }
.success-icon { font-size: 56px; margin-bottom: 1.25rem; }

/* ─── ADMIN PANEL ─── */
#adminOverlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; display: none; align-items: flex-end; justify-content: center;
}
#adminOverlay.open { display: flex; }
.admin-panel {
  background: #fff; border-radius: 20px 20px 0 0;
  max-width: 640px; width: 100%; max-height: 85vh;
  overflow-y: auto; padding: 1.5rem;
}
.admin-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 1.25rem; padding-bottom: .875rem; border-bottom: 0.5px solid var(--ge);
}
.admin-header h3 { font-size: 15px; font-weight: 700; }
.admin-add-form { background: var(--gf); border-radius: var(--r); padding: 1rem; margin-bottom: 1rem; border: 0.5px solid var(--ge); }
.admin-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 0;
  border-bottom: 0.5px solid #f1f3f5; font-size: 13px;
}
.admin-item:last-child { border: none; }
.btn-delete {
  padding: 4px 10px; border-radius: 6px; border: 0.5px solid #fca5a5;
  color: #dc2626; background: #fff; font-size: 11px; cursor: pointer; font-family: inherit;
}
.btn-delete:hover { background: #fef2f2; }

/* ─── HISTORY PANEL ─── */
#historyOverlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; display: none; align-items: flex-end; justify-content: center;
}
#historyOverlay.open { display: flex; }
.history-card {
  background: var(--gf); border-radius: var(--r); padding: 1rem;
  margin-bottom: .75rem; border: 0.5px solid var(--ge);
}
.history-card .hc-date { font-size: 11px; color: #c8cad0; margin-bottom: 6px; }
.history-card .hc-title { font-size: 13px; font-weight: 700; color: var(--g1); margin-bottom: 4px; }
.history-card .hc-detail { font-size: 12px; color: var(--g6); line-height: 1.6; }
.history-empty { text-align: center; padding: 2rem 1rem; color: #c8cad0; font-size: 13px; }

/* ─── ADMIN AUTH ─── */
.admin-only { display: none !important; }
.admin-mode .admin-only { display: inline-flex !important; }
#adminLoginOverlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; display: none; align-items: center; justify-content: center;
}
#adminLoginOverlay.open { display: flex; }
.admin-login-box {
  background: #fff; border-radius: var(--rlg); padding: 2rem 1.75rem;
  max-width: 360px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.12);
}
.admin-login-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.admin-login-box p { font-size: 12px; color: var(--g6); margin-bottom: 1.25rem; }
.admin-login-box input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--ge); border-radius: var(--rsm);
  font-size: 14px; font-family: inherit; margin-bottom: 10px;
}
.admin-login-box input:focus { outline: none; border-color: var(--t); }
.admin-login-error { font-size: 11px; color: #dc2626; margin-bottom: 8px; display: none; }
.admin-login-btns { display: flex; gap: 8px; }
.admin-login-btns button { flex: 1; padding: 10px; border-radius: var(--rsm); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; border: none; }
.admin-login-btns .al-cancel { background: var(--gf); color: var(--g6); border: 1px solid var(--ge); }
.admin-login-btns .al-submit { background: var(--t); color: #fff; }
</style>
</head>
<body>

<!-- ════ START SCREEN ════ -->
<div id="apiScreen">
  <div class="api-box" style="text-align:center; padding:3rem 2rem;">
    <div class="api-brand" style="font-size:13px; letter-spacing:.18em; margin-bottom:1.25rem;">REDMEDICOS</div>
    <div style="font-size:48px; margin-bottom:.75rem;">🧪</div>
    <h1 style="font-size:26px; line-height:1.35; margin-bottom:.5rem;">맞춤형 화장품<br>발주 플랫폼</h1>
    <p style="margin-bottom:1.75rem;">AI 기반 성분 추천 · 6단계 워크플로우 · 원가 자동 계산</p>

    <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:1.5rem;">
      <div style="display:flex; align-items:center; gap:10px; background:var(--gf); border-radius:var(--rsm); padding:12px 14px; text-align:left;">
        <span style="font-size:20px;">🎯</span>
        <div><div style="font-size:12px; font-weight:700; color:var(--g1);">개발 목표 설정</div><div style="font-size:11px; color:var(--g6);">원하는 효능과 고객군을 자유롭게 입력</div></div>
      </div>
      <div style="display:flex; align-items:center; gap:10px; background:var(--gf); border-radius:var(--rsm); padding:12px 14px; text-align:left;">
        <span style="font-size:20px;">🤖</span>
        <div><div style="font-size:12px; font-weight:700; color:var(--g1);">AI 성분 추천</div><div style="font-size:11px; color:var(--g6);">Gemini AI가 최적의 추출물 자동 분석</div></div>
      </div>
      <div style="display:flex; align-items:center; gap:10px; background:var(--gf); border-radius:var(--rsm); padding:12px 14px; text-align:left;">
        <span style="font-size:20px;">📦</span>
        <div><div style="font-size:12px; font-weight:700; color:var(--g1);">발주서 제출</div><div style="font-size:11px; color:var(--g6);">원가 산출부터 연구팀 전달까지 한 번에</div></div>
      </div>
    </div>

    <button class="btn-full btn-primary" style="padding:13px; font-size:15px;" onclick="startWithoutKey()">시작하기</button>
    <p style="font-size:11px; color:#c8cad0; margin-top:12px;">레드메디코스 교육생 전용</p>
  </div>
</div>

<!-- ════ MAIN APP ════ -->
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-brand">🧪 레드메디코스 <em>발주 플랫폼</em></div>
    <div class="topbar-actions">
      <button class="btn-sm admin-only" onclick="openApiSetting()" id="apiKeyBtn">🔑 API 키 <span id="apiStatus" style="font-size:9px"></span></button>
      <button class="btn-sm admin-only" onclick="openHistory()">📋 발주 이력</button>
      <button class="btn-sm admin-only" onclick="openAdmin()">⚙ 성분 관리</button>
      <button class="btn-sm" onclick="goToStep(1)">🏠 홈</button>
      <button class="btn-sm" onclick="resetApp()">새 발주</button>
      <button class="btn-sm" onclick="toggleAdminLogin()" id="adminToggleBtn">🔒 관리자</button>
    </div>
  </div>
  <div class="wrap">
    <div class="progress" id="progressBar"></div>
    <div id="stepContent"></div>
  </div>
</div>

<!-- ════ ADMIN LOGIN MODAL ════ -->
<div id="adminLoginOverlay" onclick="if(event.target===event.currentTarget)closeAdminLogin()">
  <div class="admin-login-box">
    <h3>🔐 관리자 로그인</h3>
    <p>관리자 기능을 사용하려면 비밀번호를 입력하세요</p>
    <input type="password" id="adminPwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')submitAdminLogin()">
    <div class="admin-login-error" id="adminLoginError">비밀번호가 올바르지 않습니다</div>
    <div class="admin-login-btns">
      <button class="al-cancel" onclick="closeAdminLogin()">취소</button>
      <button class="al-submit" onclick="submitAdminLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- ════ ORDER HISTORY PANEL ════ -->
<div id="historyOverlay" onclick="if(event.target===event.currentTarget)closeHistory()">
  <div class="admin-panel">
    <div class="admin-header">
      <h3>📋 발주 이력</h3>
      <button class="btn-sm" onclick="closeHistory()">✕ 닫기</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- ════ ADMIN PANEL ════ -->
<div id="adminOverlay" onclick="adminOverlayClose(event)">
  <div class="admin-panel">
    <div class="admin-header">
      <h3>📦 성분 관리</h3>
      <button class="btn-sm" onclick="closeAdmin()">✕ 닫기</button>
    </div>
    <!-- Add form -->
    <div class="admin-add-form">
      <div style="font-size:10px;font-weight:800;color:var(--g6);margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase">새 성분 추가</div>
      <div class="form-2" style="margin-bottom:8px">
        <div>
          <label class="form-label">성분명</label>
          <input type="text" class="inp" id="newExtName" placeholder="예: 병풀추출물">

function buildExtractList() {
  return extracts.map(e =>
    `- ${e.name} (효능: ${e.tags.length ? e.tags.join(', ') : '정보 없음'})`
  ).join('\n');
}

function buildContextInfo() {
  const formula = getFormula();
  const funcs = STATE.functions.length ? STATE.functions.join(', ') : '없음';
  const body = STATE.bodyPart || '미선택';
  const form = formula ? `${formula.name} - ${formula.desc}` : '미선택';
  return `사용 부위: ${body}\n기능성 화장품: ${funcs}\n제형: ${form}`;
}

async function callGemini(description) {
  if (!STATE.apiKey) return [];
  const prompt =
    `당신은 화장품 성분 전문가입니다. 아래 조건에 가장 적합한 성분 5~7개를 추천하세요.\n\n` +
    `[개발 목적]\n${description}\n\n` +
    `[제품 조건]\n${buildContextInfo()}\n\n` +
    `[사용 가능한 성분 목록]\n${buildExtractList()}\n\n` +
    `위 조건을 모두 고려하여 가장 적합한 성분을 선택하세요.\n` +
    `JSON 형식으로만 응답 (마크다운, 설명 없이): {"recommendations":["성분명1","성분명2"]}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${STATE.apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.3, maxOutputTokens: 2048 }
        })
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    let text = data.candidates[0].content.parts[0].text;
    text = text.replace(/```json|```/g, '').trim();
    return JSON.parse(text).recommendations || [];
  } catch (err) {
    console.error('[Gemini Error]', err);
    return [];
  }
}

  return scored
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 6)
    .map(x => x.name);
}

// ════════════════════════════════════════════════════════════
//  📊  PROGRESS RENDER
// ════════════════════════════════════════════════════════════
function renderProgress() {
  const labels = ['목표 설정', '제형 선택', '추출물', '용량/수량', '용기', '최종 제출'];
  let html = '';
  labels.forEach((label, i) => {
    const n = i + 1, done = n < STATE.step, active = n === STATE.step;
    html += `<div class="pdot">
      <div class="pcircle ${done ? 'done' : active ? 'active' : ''}">${done ? '✓' : n}</div>
      <div class="plabel ${active ? 'active' : ''}">${label}</div>
    </div>`;
    if (i < labels.length - 1)
      html += `<div class="pline ${done ? 'done' : ''}"></div>`;
  });
  document.getElementById('progressBar').innerHTML = html;
}

// ── STEP 1: 개발 목표 설정 ──
function buildStep1() {

// ── STEP 2: 제형 선택 (카테고리 → 서브옵션) ──
function getSelectedCategory() {
  if (!STATE.formula) return null;
  return FORMULA_CATEGORIES.find(cat => cat.subs.some(s => s.id === STATE.formula)) || null;
}

function buildStep2() {
  const selCat = getSelectedCategory();

  const catCards = FORMULA_CATEGORIES.map(cat => {
    const active = selCat && selCat.id === cat.id;
    return `<div class="sel-card ${active ? 'active' : ''}" onclick="selectFormulaCategory('${cat.id}')">
      <div class="sc-icon">${formulaIcon(cat.icon)}</div>
      <div class="sc-name">${cat.name}</div>
    </div>`;
  }).join('');

  let subSection = '';
  if (selCat) {
    const chips = selCat.subs.map(s =>
      `<button class="sub-chip ${STATE.formula === s.id ? 'active' : ''}" data-id="${s.id}" onclick="selectFormulaSub('${s.id}')">${s.name}</button>`

      <div class="formula-sub-area">

      <div id="formulaSubArea">${subSection}</div>

      <button class="btn primary" id="btnNext2" ${!STATE.formula ? 'disabled' : ''} onclick="goToStep(3)">다음 단계 →</button>
    </div>`;
}

// ── STEP 3: 추출물 선택 ──

function buildAIChips() {
  if (!STATE.aiRecs.length)

    return `<div class="chip ai-rec ${STATE.selExtracts[name] !== undefined ? 'sel' : ''}"
      onclick="toggleExtract('${name}', ${e.price})">
      ${name}&nbsp;<span style="color:var(--tm);font-size:10px">+${N(e.price)}원</span>
    </div>`;
  }).join('');
}

function buildTrendChips() {
  if (!STATE.trendRecs.length)
    return `<span style="font-size:12px;color:#c8cad0">트렌드 성분을 불러올 수 없습니다</span>`;

// ════════════════════════════════════════════════════════════
//  🔘  EVENT HANDLERS
// ════════════════════════════════════════════════════════════
function toggleFunction(fn, checked, el) {
  if (checked) { if (!STATE.functions.includes(fn)) STATE.functions.push(fn); }
  else STATE.functions = STATE.functions.filter(x => x !== fn);
  el.closest('label').classList.toggle('checked', checked);
}

function selectBodyPart(name, el) {
  document.querySelectorAll('.body-grid .sel-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (name === '직접입력') {
    STATE.bodyPart = '';
    // 기존 customBodyInput 제거 후 새로 생성
    let wrapper = document.getElementById('customBodyWrapper');
    if (!wrapper) {
      wrapper = document.createElement('div');
      wrapper.id = 'customBodyWrapper';
      wrapper.style.cssText = 'margin-top:10px';
      wrapper.innerHTML = `<input type="text" id="customBodyInput" placeholder="사용 부위를 직접 입력하세요"
        style="width:100%;padding:10px 12px;border:1px solid var(--ge);border-radius:var(--rsm);font-size:14px;font-family:inherit"
        oninput="STATE.bodyPart=this.value.trim()">`;
      el.closest('.card').querySelector('.body-grid').after(wrapper);
    }
    setTimeout(() => document.getElementById('customBodyInput')?.focus(), 50);
  } else {
    STATE.bodyPart = name;
    const wrapper = document.getElementById('customBodyWrapper');
    if (wrapper) wrapper.remove();
  }
}

function selectFormulaCategory(catId) {
  const cat = FORMULA_CATEGORIES.find(c => c.id === catId);
  if (!cat) return;

  // 카테고리만 바뀌면 서브 선택 초기화
  const prevCat = getSelectedCategory();
  if (!prevCat || prevCat.id !== catId) {
    STATE.formula = null;
    STATE.container = null;
  }

  // 카테고리 active 표시
  document.querySelectorAll('#formulaGrid .sel-card').forEach(c => c.classList.remove('active'));
  const cards = document.querySelectorAll('#formulaGrid .sel-card');
  const idx = FORMULA_CATEGORIES.findIndex(c => c.id === catId);
  if (cards[idx]) cards[idx].classList.add('active');

  // 서브옵션 렌더링
  const chips = cat.subs.map(s =>
    `<button class="sub-chip ${STATE.formula === s.id ? 'active' : ''}" data-id="${s.id}" onclick="selectFormulaSub('${s.id}')">${s.name}</button>`
  ).join('');
  document.getElementById('formulaSubArea').innerHTML = `
    <div class="formula-sub-area">
      <div class="formula-sub-label">${formulaIcon(cat.icon)} ${cat.name} 세부 타입을 선택하세요</div>
      <div class="formula-sub-chips">${chips}</div>
    </div>`;

  // 서브가 1개면 자동 선택
  if (cat.subs.length === 1) {
    selectFormulaSub(cat.subs[0].id);
  } else {
    const btn = document.getElementById('btnNext2');
    if (btn) btn.setAttribute('disabled', '');
  }
}

function selectFormulaSub(subId) {
  STATE.formula = subId;
  STATE.container = null;
  document.querySelectorAll('.sub-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.id === subId);
  });
  const btn = document.getElementById('btnNext2');
  if (btn) btn.removeAttribute('disabled');
}

// 하위 호환
function selectFormula(id, el) {
  STATE.formula = id; STATE.container = null;
  document.querySelectorAll('.formula-grid .sel-card').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  const nextBtn = document.querySelector('.btn-row .btn.primary');
  if (nextBtn) nextBtn.removeAttribute('disabled');
}

function selectContainer(id) {
  STATE.container = id;
  document.querySelectorAll('.container-grid .sel-card').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const nextBtn = document.querySelector('.btn-row .btn.primary');
  if (nextBtn) nextBtn.removeAttribute('disabled');
}

function toggleExtract(name, price) {
  if (STATE.selExtracts[name] !== undefined) delete STATE.selExtracts[name];
  else STATE.selExtracts[name] = price;

  // 모든 동일 성분 칩 상태 동기화
  document.querySelectorAll('.chip').forEach(chip => {
    if (chip.textContent.trim().startsWith(name))
      chip.classList.toggle('sel', STATE.selExtracts[name] !== undefined);
  });
  // 가격 업데이트
  const keys = Object.keys(STATE.selExtracts);
  const pd = document.getElementById('priceDisplay');
  if (pd) pd.textContent = N(getUnitCost()) + '원';
  const sl = document.getElementById('selectedList');
  if (sl) sl.textContent = keys.length ? keys.join(', ') : '추출물 미선택';
}

function updateVolume(v) {
  STATE.volume = parseInt(v);
  const moq = getMOQ(STATE.volume);
  if (STATE.quantity < moq) STATE.quantity = moq;
  document.getElementById('stepContent').innerHTML = buildStep4();
}

function updateQuantity(v) {
  STATE.quantity = parseInt(v) || 0;
  const moq = getMOQ(STATE.volume);
  const ok = STATE.quantity >= moq;
  const warn = document.getElementById('moqWarning');
  if (warn) warn.classList.toggle('show', !ok);
  const btn = document.getElementById('btnNext4');
  if (btn) btn.disabled = !ok;
  const rev = document.getElementById('totalRevenue');
  if (rev) rev.textContent = N(getUnitCost() * STATE.quantity) + '원';
}

// ── STEP 1 → 2 검증 ──
function nextStep1() {
  const desc = (document.getElementById('descInput')?.value || '').trim();
  STATE.description = desc;
  if (!STATE.description) { alert('화장품 개발 목표를 입력해주세요'); return; }
  if (!STATE.bodyPart)    { alert('사용 부위를 선택해주세요'); return; }
  goToStep(2);
}

// ════════════════════════════════════════════════════════════
//  🧭  STEP NAVIGATION
// ════════════════════════════════════════════════════════════
async function goToStep(n) {
  STATE.step = n;
  renderProgress();

  let html = '';
  if      (n === 1) html = buildStep1();
  else if (n === 2) html = buildStep2();
  else if (n === 3) html = buildStep3(!!STATE.apiKey);   // API키 있으면 로딩 스피너
  else if (n === 4) html = buildStep4();
  else if (n === 5) html = buildStep5();
  else if (n === 6) html = buildStep6();

  document.getElementById('stepContent').innerHTML = html;

  // Step 3 진입 시 AI 추천 로드
  if (n === 3) loadAIRecommendations();
}

async function loadAIRecommendations() {
  if (STATE.apiKey) {
    const [recs, trends] = await Promise.all([
      callGemini(STATE.description),
      callGeminiTrend()
    ]);
    STATE.aiRecs = recs;
    STATE.trendRecs = trends;
  } else {
    STATE.aiRecs = fallbackRecommend(STATE.description);
    STATE.trendRecs = [];
  }
  const aiEl = document.getElementById('aiSection');
  if (aiEl) aiEl.innerHTML = `<div class="chips" id="aiChips">${buildAIChips()}</div>`;
  const trendEl = document.getElementById('trendSection');
  if (trendEl) trendEl.innerHTML = `<div class="chips" id="trendChips">${buildTrendChips()}</div>`;
}

function submitOrder() {
  const formula = getFormula(), container = getContainer();
  const selKeys = Object.keys(STATE.selExtracts);
  const order = {
    id:          Date.now(),
    date:        new Date().toLocaleString('ko-KR'),
    description: STATE.description,
    functions:   [...STATE.functions],
    bodyPart:    STATE.bodyPart,
    formula:     formula ? `${formula.name} (${formula.desc})` : '-',
    extracts:    selKeys,
    extractCost: getExtTotal(),
    unitCost:    getUnitCost(),
    volume:      STATE.volume,
    quantity:    STATE.quantity,
    container:   container?.name || '-',
    totalCost:   getUnitCost() * STATE.quantity,
  };

  // 이력 저장
  saveOrder(order);

  // EmailJS 발송
  if (CONFIG.EMAILJS_PUBLIC_KEY && CONFIG.EMAILJS_SERVICE_ID && CONFIG.EMAILJS_TEMPLATE_ID) {
    sendEmailJS(order);
  }

  // Google Sheets 전송
  if (CONFIG.GOOGLE_SHEETS_URL) {
    sendToGoogleSheets(order);
  }

  STATE.step = 7;
  renderProgress();
  document.getElementById('stepContent').innerHTML = buildSuccess();
}

function resetApp() {
  Object.assign(STATE, {
    step: 1, description: '', functions: [], bodyPart: '',
    formula: null, selExtracts: {}, aiRecs: [], trendRecs: [], volume: 50, quantity: 500, container: null
  });
  goToStep(1);
}

// ════════════════════════════════════════════════════════════
//  ⚙  ADMIN PANEL
// ════════════════════════════════════════════════════════════
function closeAdmin() { document.getElementById('adminOverlay').classList.remove('open'); }
function adminOverlayClose(e) { if (e.target === e.currentTarget) closeAdmin(); }

function renderAdminList() {
  document.getElementById('extractCount').textContent = extracts.length;
  document.getElementById('adminList').innerHTML = extracts.map(e =>
    `<div class="admin-item">
      <span style="flex:2;font-weight:600">${e.name}</span>
      <span style="flex:1;color:var(--g6)">${N(e.price)}원</span>
      <span style="flex:3;font-size:11px;color:#c8cad0">${e.tags.join(', ')}</span>
      <button class="btn-delete" onclick="deleteExtract(${e.id})">삭제</button>
    </div>`
  ).join('');
}

function addExtract() {
  const name  = document.getElementById('newExtName').value.trim();
  const price = parseInt(document.getElementById('newExtPrice').value) || 0;
  const tags  = document.getElementById('newExtTags').value
    .split(',').map(t => t.trim()).filter(Boolean);

  if (!name || !price) { alert('성분명과 단가를 입력해주세요'); return; }
  if (extracts.find(e => e.name === name)) { alert('이미 존재하는 성분입니다'); return; }

  const id = Math.max(0, ...extracts.map(e => e.id)) + 1;
  extracts.push({ id, name, price, tags });
  saveExtracts();

  document.getElementById('newExtName').value  = '';
  document.getElementById('newExtPrice').value = '';
  document.getElementById('newExtTags').value  = '';
  renderAdminList();
  alert(`✓ "${name}" 성분이 추가되었습니다`);
}

function deleteExtract(id) {
  const ext = extracts.find(x => x.id === id);
  if (!confirm(`"${ext?.name}" 성분을 삭제할까요?`)) return;
  extracts = extracts.filter(x => x.id !== id);
  saveExtracts();
  if (ext && STATE.selExtracts[ext.name] !== undefined) delete STATE.selExtracts[ext.name];
  renderAdminList();
}

// ════════════════════════════════════════════════════════════
//  📧  EmailJS 발송
// ════════════════════════════════════════════════════════════
function sendEmailJS(order) {
  if (typeof emailjs === 'undefined') {
    console.warn('[EmailJS] SDK가 로드되지 않았습니다');
    return;
  }
  emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, {
    to_email:    CONFIG.SUBMIT_EMAIL,
    order_date:  order.date,
    description: order.description,
    functions:   order.functions.length ? order.functions.join(' + ') : '해당 없음',
    body_part:   order.bodyPart,
    formula:     order.formula,
    extracts:    order.extracts.join(', ') || '없음',
    volume:      order.volume + 'ml',
    quantity:    N(order.quantity) + '개',
    unit_cost:   N(order.unitCost) + '원',
    total_cost:  N(order.totalCost) + '원',
    container:   order.container,
  }).then(
    () => console.log('[EmailJS] 전송 성공'),
    err => console.error('[EmailJS] 전송 실패', err)
  );
}

// ════════════════════════════════════════════════════════════
//  📊  Google Sheets 연동
// ════════════════════════════════════════════════════════════
function sendToGoogleSheets(order) {
  fetch(CONFIG.GOOGLE_SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      date:        order.date,
      description: order.description,
      functions:   order.functions.join(' + ') || '해당 없음',
      bodyPart:    order.bodyPart,
      formula:     order.formula,
      extracts:    order.extracts.join(', ') || '없음',
      volume:      order.volume,
      quantity:    order.quantity,
      unitCost:    order.unitCost,
      totalCost:   order.totalCost,
      container:   order.container,
    })
  }).then(
    () => console.log('[Google Sheets] 전송 성공'),
    err => console.error('[Google Sheets] 전송 실패', err)
  );
}

// ════════════════════════════════════════════════════════════
//  📋  발주 이력 패널
// ════════════════════════════════════════════════════════════
function openHistory() {
  const orders = getOrderHistory();
  let html = '';
  if (orders.length === 0) {
    html = '<div class="history-empty">아직 발주 이력이 없습니다</div>';
  } else {
    html = orders.map(o => `
      <div class="history-card">
        <div class="hc-date">${o.date}</div>
        <div class="hc-title">${o.description || '-'}</div>
        <div class="hc-detail">
          ${o.formula} · ${o.volume}ml × ${N(o.quantity)}개 · ${o.container}<br>
          추출물: ${o.extracts.length ? o.extracts.join(', ') : '없음'}<br>
          <strong style="color:var(--t)">총 원가: ${N(o.totalCost)}원</strong>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('historyList').innerHTML = html;
  document.getElementById('historyOverlay').classList.add('open');
}

function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
}

// ════════════════════════════════════════════════════════════
//  🔒  관리자 인증
// ════════════════════════════════════════════════════════════
function toggleAdminLogin() {
  if (STATE.isAdmin) {
    STATE.isAdmin = false;
    document.getElementById('mainApp').classList.remove('admin-mode');
    document.getElementById('adminToggleBtn').innerHTML = '🔒 관리자';
  } else {
    document.getElementById('adminLoginOverlay').classList.add('open');
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminLoginError').style.display = 'none';
    setTimeout(() => document.getElementById('adminPwInput').focus(), 100);
  }
}

function submitAdminLogin() {
  const pw = document.getElementById('adminPwInput').value;
  if (!CONFIG.ADMIN_PASSWORD || pw === CONFIG.ADMIN_PASSWORD) {
    STATE.isAdmin = true;
    document.getElementById('mainApp').classList.add('admin-mode');
    document.getElementById('adminToggleBtn').innerHTML = '🔓 로그아웃';
    closeAdminLogin();
  } else {
    document.getElementById('adminLoginError').style.display = 'block';
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminPwInput').focus();
  }
}

function closeAdminLogin() {
  document.getElementById('adminLoginOverlay').classList.remove('open');
}

function openAdmin() {
  document.getElementById('adminOverlay').classList.add('open');
  renderAdminList();
}

// ════════════════════════════════════════════════════════════
//  🚀  LAUNCH
// ════════════════════════════════════════════════════════════
function startWithoutKey() {
  if (CONFIG.GEMINI_API_KEY) STATE.apiKey = CONFIG.GEMINI_API_KEY;
  launch();
}

function openApiSetting() {
  const current = STATE.apiKey ? '(현재 설정됨)' : '(미설정)';
  const key = prompt(`Gemini API 키 입력 ${current}\n비우면 API 키 없이 사용합니다.`, STATE.apiKey || '');
  if (key === null) return;
  STATE.apiKey = key.trim();
  updateApiStatus();
}

function updateApiStatus() {
  const el = document.getElementById('apiStatus');
  if (el) el.textContent = STATE.apiKey ? '✓' : '';
}

function initEmailJS() {
  if (!CONFIG.EMAILJS_PUBLIC_KEY) return;
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
  script.onload = () => emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY);
  document.head.appendChild(script);
}

function launch() {
  initEmailJS();
  document.getElementById('apiScreen').style.display = 'none';
  document.getElementById('mainApp').style.display   = 'block';
  updateApiStatus();
  goToStep(1);
}

</script>
