<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맞춤형 화장품 발주 | 레드메디코스</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --t: #C8102E; --tl: #FDE8EC; --tm: #F4A0AD; --td: #7A0A1E; --tmd: #A30D26;
  --al: #FAEEDA; --ad: #633806; --am: #EF9F27;
  --bl: #E6F1FB; --bd: #0C447C;
  --ge: #e8eaed; --gf: #f7f8fa; --g6: #6b7280; --g3: #374151; --g1: #111827;
  --r: 12px; --rsm: 8px; --rlg: 16px;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--gf); color: var(--g1); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ─── LOADING ─── */
#loadingScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#fdf2f4 0%,#f7f8fa 60%); }

/* ─── LOGIN SCREEN ─── */
#loginScreen {
  display:none; min-height:100vh; align-items:center; justify-content:center;
  padding:1.5rem; background:linear-gradient(135deg,#fdf2f4 0%,#f7f8fa 60%);
}
.login-box {
  background:#fff; border-radius:var(--rlg); padding:2.5rem 2rem;
  max-width:440px; width:100%; box-shadow:0 4px 24px rgba(0,0,0,.07); border:0.5px solid var(--ge);
}
.login-tabs { display:flex; margin-bottom:1.5rem; border-bottom:2px solid var(--ge); }
.login-tab { flex:1; padding:10px; text-align:center; font-size:14px; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; color:var(--g6); transition:all .15s; }
.login-tab.active { color:var(--t); border-bottom-color:var(--t); }
.login-form { display:none; }
.login-form.active { display:block; }
.info-field { margin-bottom:14px; }
.field-label { display:block; font-size:11px; font-weight:700; color:var(--g6); margin-bottom:4px; letter-spacing:.03em; }
.inp { width:100%; border:1px solid var(--ge); border-radius:var(--rsm); padding:10px 13px; font-size:14px; font-family:inherit; color:var(--g1); background:#fff; transition:border-color .15s,box-shadow .15s; }
.inp:focus { outline:none; border-color:var(--t); box-shadow:0 0 0 3px rgba(200,16,46,.1); }
.btn-full { width:100%; padding:11px; border-radius:var(--rsm); font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; transition:all .15s; border:none; }
.btn-primary { background:var(--t); color:#fff; }
.btn-primary:hover { background:var(--tmd); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }

/* ─── DASHBOARD ─── */
#dashboardScreen, #adminScreen { display:none; min-height:100vh; background:var(--gf); }
.dash-topbar {
  background:#fff; border-bottom:0.5px solid var(--ge); padding:0 1.5rem;
  height:56px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:20;
}
.topbar-brand { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--g1); }
.topbar-brand em { font-style:normal; font-size:11px; font-weight:400; color:var(--g6); padding:2px 8px; border:0.5px solid var(--ge); border-radius:20px; }
.dash-content { max-width:800px; margin:0 auto; padding:1.5rem 1rem 5rem; }
.dash-welcome { font-size:20px; font-weight:700; margin-bottom:1.25rem; color:var(--g1); }
.dash-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:1.5rem; }
@media(max-width:480px) { .dash-stats { grid-template-columns:1fr; } }
.stat-card { background:#fff; border-radius:var(--r); border:0.5px solid var(--ge); padding:16px; text-align:center; }
.stat-number { font-size:28px; font-weight:800; color:var(--t); }
.stat-label { font-size:11px; color:var(--g6); margin-top:4px; }

/* ─── ORDER CARDS ─── */
.order-card { background:#fff; border-radius:var(--r); border:0.5px solid var(--ge); padding:1.25rem; margin-bottom:12px; transition:all .15s; }
.oc-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.oc-date { font-size:11px; color:var(--g6); }
.oc-badge { font-size:10px; font-weight:700; padding:3px 10px; border-radius:10px; }
.oc-title { font-size:14px; font-weight:700; color:var(--g1); margin-bottom:4px; }
.oc-detail { font-size:12px; color:var(--g6); line-height:1.6; margin-bottom:12px; }

/* ─── STATUS TIMELINE ─── */
.status-timeline { display:flex; align-items:flex-start; padding:8px 0; }
.st-step { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; }
.st-step:not(:last-child)::after { content:''; position:absolute; top:11px; left:50%; width:100%; height:2px; background:var(--ge); z-index:0; }
.st-step.done:not(:last-child)::after { background:var(--tm); }
.st-dot { width:22px; height:22px; border-radius:50%; border:2px solid var(--ge); background:#fff; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; position:relative; z-index:1; transition:all .3s; color:var(--ge); }
.st-dot.done { background:var(--t); border-color:var(--t); color:#fff; }
.st-dot.current { background:#fff; border-color:var(--am); color:var(--am); box-shadow:0 0 0 4px rgba(239,159,39,.15); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 4px rgba(239,159,39,.15)} 50%{box-shadow:0 0 0 8px rgba(239,159,39,.08)} }
.st-dot.current { animation:pulse 2s infinite; }
.st-label { font-size:8.5px; color:#c8cad0; text-align:center; margin-top:4px; line-height:1.2; white-space:nowrap; }
.st-label.done { color:var(--tmd); font-weight:600; }
.st-label.current { color:var(--am); font-weight:700; }

/* ─── ADMIN STUDENT CARDS ─── */
.admin-student-card { background:#fff; border-radius:var(--r); border:0.5px solid var(--ge); padding:14px 18px; margin-bottom:8px; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:space-between; }
.admin-student-card:hover { border-color:var(--t); background:var(--tl); }
.asc-name { font-size:14px; font-weight:700; color:var(--g1); }
.asc-email { font-size:11px; color:var(--g6); margin-top:2px; }
.status-actions { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
.status-btn { padding:6px 14px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; border:1.5px solid var(--ge); background:#fff; color:var(--g6); font-family:inherit; transition:all .15s; }
.status-btn:hover { border-color:var(--t); color:var(--t); }
.status-btn.next { background:var(--t); border-color:var(--t); color:#fff; }
.status-btn.next:hover { background:var(--tmd); }
.status-btn.prev { border-color:var(--tm); color:var(--tmd); }

/* ─── MAIN LAYOUT ─── */
#mainApp { display:none; }
.topbar {
  background:#fff; border-bottom:0.5px solid var(--ge); padding:0 1.5rem;
  height:52px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:20;
}
.topbar-left { display:flex; align-items:center; gap:8px; }
.topbar-actions { display:flex; gap:6px; }
.btn-sm { padding:6px 12px; border-radius:var(--rsm); font-size:12px; font-weight:500; font-family:inherit; cursor:pointer; border:0.5px solid var(--ge); background:#fff; color:var(--g6); transition:all .15s; }
.btn-sm:hover { border-color:var(--t); color:var(--t); }
.wrap-outer { display:flex; max-width:1080px; margin:0 auto; padding:1.5rem 1rem 5rem; gap:24px; }
.wrap { flex:1; max-width:660px; min-width:0; }
.guide-panel {
  width:280px; flex-shrink:0; position:sticky; top:80px; align-self:flex-start;
  background:#fff; border:1px solid var(--ge); border-radius:var(--r);
  padding:18px 16px; max-height:calc(100vh - 100px); overflow-y:auto;
}
.gp-title { font-size:13px; font-weight:800; color:var(--g1); margin-bottom:12px; }
.gp-section { margin-bottom:14px; }
.gp-section-title { font-size:11px; font-weight:700; color:var(--t); margin-bottom:6px; }
.gp-text { font-size:12px; color:var(--g3); line-height:1.6; }
.gp-text strong { color:var(--t); }
.gp-text ul { margin:4px 0 0; padding-left:16px; }
.gp-text li { margin-bottom:3px; }
.gp-divider { height:1px; background:var(--ge); margin:12px 0; }
@media(max-width:900px) { .guide-panel { display:none; } }

/* ─── PROGRESS BAR ─── */
.progress {
  display:flex; align-items:flex-start; padding:1.1rem .875rem .75rem;
  background:#fff; border-radius:var(--r); border:0.5px solid var(--ge); margin-bottom:1.25rem;
}
.pdot { display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; }
.pcircle {
  width:28px; height:28px; border-radius:50%;
  border:1.5px solid #c8cad0; background:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:#c8cad0; transition:all .2s;
}
.pcircle.done { background:var(--tm); border-color:var(--tm); color:var(--td); }
.pcircle.active { background:var(--t); border-color:var(--t); color:#fff; }
.plabel { font-size:9.5px; color:#c8cad0; text-align:center; line-height:1.3; transition:color .2s; }
.plabel.active { color:var(--tmd); font-weight:700; }
.pline { flex:1; height:1.5px; background:var(--ge); margin-top:-15px; transition:background .2s; }
.pline.done { background:var(--tm); }

/* ─── CARDS ─── */
.card { background:#fff; border-radius:var(--r); border:0.5px solid var(--ge); padding:1.25rem 1.25rem 1rem; margin-bottom:.875rem; }
.card-title { font-size:15px; font-weight:700; color:var(--g1); margin-bottom:4px; }
.card-sub { font-size:13px; color:var(--g6); line-height:1.6; margin-bottom:1rem; }
.section-tag { font-size:10px; font-weight:800; color:#c8cad0; letter-spacing:.1em; text-transform:uppercase; margin:.875rem 0 .5rem; }

/* ─── FORM ELEMENTS ─── */
textarea {
  width:100%; border:1px solid var(--ge); border-radius:var(--rsm);
  padding:11px 13px; font-size:13px; font-family:inherit; resize:vertical;
  min-height:90px; color:var(--g1); background:#fff; line-height:1.6;
  transition:border-color .15s,box-shadow .15s;
}
textarea:focus { outline:none; border-color:var(--t); box-shadow:0 0 0 3px rgba(200,16,46,.1); }
select, input[type="number"] {
  width:100%; border:1px solid var(--ge); border-radius:var(--rsm);
  padding:9px 13px; font-size:13px; font-family:inherit; color:var(--g1); background:#fff;
  transition:border-color .15s;
}
select:focus, input[type="number"]:focus { outline:none; border-color:var(--t); }
.form-label { font-size:11px; font-weight:700; color:var(--g6); display:block; margin-bottom:4px; }
.form-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media(max-width:440px) { .form-2 { grid-template-columns:1fr; } }

/* ─── CHIPS ─── */
.chips { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:.75rem; }
.chip {
  padding:6px 13px; border-radius:20px; border:1px solid var(--ge);
  font-size:12px; cursor:pointer; color:var(--g6); background:#fff;
  transition:all .15s; user-select:none; line-height:1.4; position:relative;
}
.chip:hover { border-color:var(--t); color:var(--tmd); background:var(--tl); }
.chip.sel { background:var(--tl); border-color:var(--t); color:var(--td); font-weight:600; }
.chip.disabled { opacity:.3; cursor:not-allowed; pointer-events:none; border-style:dashed; }
.chip.ai-rec::before { content:"AI "; font-size:9px; color:var(--t); font-weight:800; }
.cat-badge { font-size:9px; font-weight:700; padding:1px 5px; border-radius:6px; margin-right:4px; vertical-align:middle; letter-spacing:.02em; }
.cat-badge.cat-에센셜오일 { background:#FEF3C7; color:#92400E; }
.cat-badge.cat-특허증활용가능 { background:#F3E8FF; color:#6B21A8; }
.cat-badge.cat-추출물 { background:#D1FAE5; color:#065F46; }
.cat-badge.cat-첨가원료 { background:#DBEAFE; color:#1E40AF; }
.chip .inci-tooltip {
  display:none; position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
  background:#1F2937; color:#fff; font-size:11px; padding:8px 12px; border-radius:8px;
  white-space:normal; width:280px; line-height:1.5; z-index:100;
  box-shadow:0 4px 12px rgba(0,0,0,.15); pointer-events:none;
}
.chip .inci-tooltip::after {
  content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
  border:6px solid transparent; border-top-color:#1F2937;
}
.chip:hover .inci-tooltip { display:block; }
.delegate-card {
  border:2px solid var(--ge); border-radius:var(--r); padding:16px 18px;
  cursor:pointer; transition:all .2s; background:#fff; margin-bottom:16px;
  display:flex; align-items:center; gap:14px;
}
.delegate-card:hover { border-color:var(--tm); background:var(--tl); }
.delegate-card.active { border-color:var(--t); background:var(--tl); }
.delegate-card .dc-icon { font-size:28px; flex-shrink:0; }
.delegate-card .dc-text { flex:1; }
.delegate-card .dc-title { font-size:14px; font-weight:700; color:var(--g1); margin-bottom:2px; }
.delegate-card .dc-sub { font-size:11px; color:var(--g6); line-height:1.4; }
.delegate-card .dc-check { width:22px; height:22px; border-radius:50%; border:2px solid var(--ge); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.delegate-card.active .dc-check { background:var(--t); border-color:var(--t); color:#fff; }

/* ─── SELECTION GRIDS ─── */
.formula-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:.75rem; }
@media(max-width:520px) { .formula-grid { grid-template-columns:repeat(3,1fr); } }
.body-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:.75rem; }
.container-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(105px,1fr)); gap:8px; margin-bottom:.75rem; }
@media(max-width:420px) { .body-grid { grid-template-columns:repeat(2,1fr); } }
.sel-card {
  border:1px solid var(--ge); border-radius:var(--r); padding:14px 10px;
  cursor:pointer; text-align:center; background:#fff; transition:all .15s;
}
.sel-card:hover { border-color:var(--t); background:var(--tl); }
.sel-card.active { border:2px solid var(--t); background:var(--tl); }
.sel-card.disabled { opacity:.3; cursor:not-allowed; pointer-events:none; border-style:dashed; }
.sel-card .sc-icon { font-size:22px; margin-bottom:6px; }
.sel-card.body-text-only { padding:10px 10px; }
.sel-card.body-text-only .sc-name { font-size:13px; margin-bottom:0; }
.sel-card .sc-name { font-size:12px; font-weight:700; color:var(--g3); margin-bottom:2px; }
.sel-card .sc-desc { font-size:10px; color:var(--g6); line-height:1.4; }
.sel-card.active .sc-name, .sel-card.active .sc-desc { color:var(--td); }
.sel-card .sc-rec { font-size:9px; font-weight:800; color:#fff; background:var(--t); padding:1px 7px; border-radius:8px; margin-top:4px; display:inline-block; }
.selected-bar {
  display:none; position:sticky; bottom:0; left:0; right:0; z-index:50;
  background:#fff; border-top:2px solid var(--t); padding:12px 16px;
  border-radius:var(--r) var(--r) 0 0; box-shadow:0 -4px 16px rgba(0,0,0,.08);
  margin:0 -16px -16px;
}
.selected-bar.show { display:block; }

/* ─── FORMULA SUB OPTIONS ─── */
.formula-sub-area {
  margin-top:12px; padding:14px 16px;
  background:var(--gf); border-radius:var(--r); border:1px solid var(--ge);
  animation:subSlide .2s ease;
}
@keyframes subSlide { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.formula-sub-label { font-size:11px; font-weight:700; color:var(--g6); margin-bottom:8px; }
.formula-sub-chips { display:flex; flex-wrap:wrap; gap:8px; }
.sub-chip {
  padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600;
  border:1.5px solid var(--ge); background:#fff; color:var(--g3);
  cursor:pointer; font-family:inherit; transition:all .15s;
}
.sub-chip:hover { border-color:var(--t); color:var(--t); }
.sub-chip.active { border-color:var(--t); background:var(--t); color:#fff; }

/* ─── FUNCTION CHECKBOXES ─── */
.fn-group { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:.875rem; }
.fn-label {
  display:flex; align-items:center; gap:6px; font-size:12px; color:var(--g3);
  cursor:pointer; padding:6px 12px; border:1px solid var(--ge); border-radius:20px;
  transition:all .15s;
}
.fn-label:hover { border-color:var(--t); color:var(--td); }
.fn-label.checked { background:var(--tl); border-color:var(--t); color:var(--td); }
.fn-label input[type="checkbox"] { accent-color:var(--t); width:13px; height:13px; }

/* ─── INFO BOXES ─── */
.price-bar {
  background:var(--tl); border-radius:var(--rsm); padding:12px 15px;
  display:flex; justify-content:space-between; align-items:center;
  margin-top:.875rem; border:0.5px solid var(--tm);
}
.pb-label { font-size:12px; color:var(--tmd); font-weight:600; }
.pb-sub { font-size:11px; color:var(--tm); margin-top:2px; }
.pb-price { font-size:22px; font-weight:800; color:var(--t); }
.notice { border-radius:var(--rsm); padding:10px 13px; font-size:12px; line-height:1.55; margin-top:.75rem; }
.notice.info { background:var(--tl); color:var(--tmd); border:0.5px solid var(--tm); }
.notice.warn { background:var(--al); color:var(--ad); border:0.5px solid var(--am); display:none; }
.notice.warn.show { display:block; }
.notice.blue { background:var(--bl); color:var(--bd); border:0.5px solid #B5D4F4; }

/* ─── AI LOADING ─── */
.ai-loading { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--tmd); padding:8px 0; }
.spinner { width:14px; height:14px; border:2px solid var(--tm); border-top-color:var(--t); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ─── NAV BUTTONS ─── */
.btn-row { display:flex; gap:8px; margin-top:1.25rem; }
.btn { padding:10px 18px; border-radius:var(--rsm); border:1px solid var(--ge); font-size:13px; font-weight:600; cursor:pointer; background:#fff; color:var(--g6); font-family:inherit; transition:all .15s; }
.btn:hover { background:var(--gf); border-color:#c8cad0; }
.btn.primary { background:var(--t); border-color:var(--t); color:#fff; }
.btn.primary:hover { background:var(--tmd); }
.btn.primary:disabled, .btn.primary[disabled] { opacity:.38; cursor:not-allowed; }

/* ─── SUMMARY TABLE ─── */
.summary-row {
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:9px 0; border-bottom:0.5px solid #f1f3f5; font-size:13px; gap:1rem;
}
.summary-row:last-child { border:none; }
.sum-key { color:var(--g6); flex-shrink:0; min-width:80px; }
.sum-val { color:var(--g1); text-align:right; font-weight:600; line-height:1.5; }

/* ─── SUCCESS ─── */
.success-screen { text-align:center; padding:4rem 1rem; }
.success-icon { font-size:56px; margin-bottom:1.25rem; }

/* ─── ADMIN PANEL (ingredients) ─── */
#adminOverlay {
  position:fixed; inset:0; background:rgba(0,0,0,.45);
  z-index:100; display:none; align-items:flex-end; justify-content:center;
}
#adminOverlay.open { display:flex; }
.admin-panel {
  background:#fff; border-radius:20px 20px 0 0;
  max-width:640px; width:100%; max-height:85vh;
  overflow-y:auto; padding:1.5rem;
}
.admin-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:1.25rem; padding-bottom:.875rem; border-bottom:0.5px solid var(--ge);
}
.admin-header h3 { font-size:15px; font-weight:700; }
.admin-add-form { background:var(--gf); border-radius:var(--r); padding:1rem; margin-bottom:1rem; border:0.5px solid var(--ge); }
.admin-item {
  display:flex; align-items:center; gap:8px; padding:8px 0;
  border-bottom:0.5px solid #f1f3f5; font-size:13px;
}
.admin-item:last-child { border:none; }
.btn-delete {
  padding:4px 10px; border-radius:6px; border:0.5px solid #fca5a5;
  color:#dc2626; background:#fff; font-size:11px; cursor:pointer; font-family:inherit;
}
.btn-delete:hover { background:#fef2f2; }

/* ─── ADMIN MODE (for ingredients in order flow) ─── */
.admin-only { display:none !important; }
.admin-mode .admin-only { display:inline-flex !important; }
</style>
</head>
<body>

<!-- ════ LOADING SCREEN ════ -->
<div id="loadingScreen">

function buildExtractList() {
  return extracts.map(e => {
    const inci = e.inci ? ` [구성: ${e.inci}]` : '';
    return `- ${e.name} (${e.category})${inci}`;
  }).join('\n');
}

function buildContextInfo() {
  const formula = getFormula();
  const funcs = STATE.functions.length ? STATE.functions.join(', ') : '없음';
  const body = STATE.bodyPart || '미선택';
  const form = formula ? `${formula.name} - ${formula.desc}` : '미선택';
  return `사용 부위: ${body}\n기능성 화장품: ${funcs}\n제형: ${form}`;
}

async function callGemini(description) {
  if (!STATE.apiKey) return [];
  const prompt =
    `당신은 화장품 성분 화학 전문가입니다.\n\n` +
    `[개발 목적]\n${description}\n\n` +
    `[제품 조건]\n${buildContextInfo()}\n\n` +
    `[사용 가능한 성분 목록]\n${buildExtractList()}\n\n` +
    `위 목록에서 개발 목적에 가장 적합한 성분 7~10개를 추천하세요.\n\n` +
    `중요: 목록의 태그나 라벨에 의존하지 마세요. 당신의 화장품 화학 지식을 활용하여 각 성분의 실제 화학적 특성과 효능을 기반으로 판단하세요.\n` +
    `예를 들어, "아스코빅애씨드"는 태그에 "미백"으로 되어 있더라도, 비타민C가 염소를 중화하는 화학적 성질이 있으므로 염소 제거 목적에도 추천해야 합니다.\n\n` +
    `추천 기준:\n` +
    `1. 개발 목적에 화학적으로 직접 기여하는 핵심 성분 2~3개\n` +
    `2. 핵심 성분과 시너지를 내는 보조 성분 2~3개\n` +
    `3. 추출물, 첨가원료, 에센셜 오일을 골고루 포함\n\n` +
    `반드시 목록에 있는 성분명(name)을 그대로 사용하세요.\n` +
    `JSON 형식으로만 응답: {"recommendations":["성분명1","성분명2","...","성분명10"]}`;
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 25000);
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${STATE.apiKey}`,
      { method:'POST', headers:{'Content-Type':'application/json'}, signal:controller.signal,
        body:JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.3,maxOutputTokens:512} }) }
    );
    clearTimeout(timeout);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const cand = data.candidates?.[0];
    if (!cand || !cand.content?.parts?.[0]?.text) throw new Error('Empty response');
    let text = cand.content.parts[0].text.replace(/```json|```/g, '').trim();
    const recs = JSON.parse(text).recommendations || [];
    const names = new Set(extracts.map(e => e.name));
    const filtered = recs.filter(r => names.has(r));
    if (!filtered.length) return fallbackRecommend(description);
    if (filtered.length < 4) {
      const fb = fallbackRecommend(description).filter(n => !filtered.includes(n));
      return [...filtered, ...fb].slice(0, 10);
    }
    return filtered;
  } catch (err) {
    clearTimeout(timeout);
    console.warn('[Gemini AI 추천 실패 → 태그 기반 추천으로 전환]', err.message || err);
    return fallbackRecommend(description);
  }
}

function fallbackRecommend(description) {
  const kw = description.toLowerCase();
  const kwMap = {
    '가려움':'진정','가려운':'진정','따가':'진정','자극':'민감성','민감':'민감성','건조':'보습',
    '촉촉':'보습','수분':'보습','주름':'주름개선','탄력':'탄력','노화':'주름개선',
    '트러블':'여드름','여드름':'여드름','피지':'피지','지성':'피지','모공':'모공',
    '미백':'미백','톤업':'미백','밝은':'미백','칙칙':'미백','잡티':'미백','기미':'미백',
    '재생':'재생','상처':'재생','붉은':'진정','홍조':'진정','염증':'항염','아토피':'민감성',
    '두피':'두피','탈모':'두피','모발':'두피','각질':'각질','보습':'보습','진정':'진정',
    '항산화':'항산화','안티에이징':'주름개선','쿨링':'쿨링','시원':'쿨링',
    '장벽':'장벽','세라마이드':'장벽','펩타이드':'펩타이드','콜라겐':'탄력',
    '수영':'해독','수영장':'해독','염소':'해독','제거':'세정','세정':'세정',
    '비듬':'비듬','영양':'영양','윤기':'영양','아기':'민감성','어린이':'민감성',
    '자외선':'자외선','다크서클':'다크서클','눈밑':'다크서클','붓기':'부기',
    '등드름':'여드름','바디워시':'세정','폼클렌징':'세정','워시':'세정',
  };
  const extraTags = new Set();
  for (const [word, tag] of Object.entries(kwMap)) { if (kw.includes(word)) extraTags.add(tag); }
  const scored = extracts.filter(e => e.name !== '무향').map(e => {
    let score = e.tags.filter(t => kw.includes(t)).length;
    score += e.tags.filter(t => extraTags.has(t)).length;
    if (kw.includes(e.name.replace(/추출물|오일|Complex/g,''))) score += 3;
    return { name: e.name, score, cat: e.category };
  });
  let result = scored.filter(x => x.score > 0).sort((a, b) => b.score - a.score);
  if (result.length >= 2) {
    const hasCat = cat => result.slice(0, 10).some(x => x.cat === cat);
    if (!hasCat('첨가원료')) { const add = scored.filter(x => x.cat === '첨가원료' && x.score > 0)[0]; if (add) result.splice(4, 0, add); }
    if (!hasCat('추출물')) { const add = scored.filter(x => x.cat === '추출물' && x.score > 0)[0]; if (add) result.splice(0, 0, add); }
  }
  if (result.length === 0) {
    result = extracts.filter(e => ['병풀추출물','녹차추출물','8중 히아루론산 Complex','나이아신아마이드','알로에베라잎즙','Super Centella'].includes(e.name)).map(e => ({name:e.name,score:1}));
  }
  return result.slice(0, 10).map(x => x.name);
}

function renderProgress() {
  const labels = ['목표 설정', '제품 유형', '용기', '용량/수량', '원료', '최종 제출'];
  let html = '';
  labels.forEach((label, i) => {
    const n = i + 1, done = n < STATE.step, active = n === STATE.step;
    html += `<div class="pdot"><div class="pcircle ${done?'done':active?'active':''}">${done?'✓':n}</div><div class="plabel ${active?'active':''}">${label}</div></div>`;
    if (i < labels.length - 1) html += `<div class="pline ${done?'done':''}"></div>`;
  });
  document.getElementById('progressBar').innerHTML = html;
}

function getFnCost() { const n = STATE.functions.length; return n===0?0:n===1?40000:65000; }

function toggleFunction(fn, checked, el) {
  const COMBINABLE = ['주름기능성','미백기능성'];
  if (checked) {
    if (STATE.functions.length >= 1) {
      const existing = STATE.functions[0];
      if (!(COMBINABLE.includes(fn) && COMBINABLE.includes(existing))) { el.checked = false; alert('주름기능성과 미백기능성만 중복 선택이 가능합니다.'); return; }
      if (STATE.functions.length >= 2) { el.checked = false; alert('기능성은 최대 2개까지 선택 가능합니다.'); return; }
    }
    if (!STATE.functions.includes(fn)) STATE.functions.push(fn);
  } else STATE.functions = STATE.functions.filter(x => x !== fn);
  el.closest('label').classList.toggle('checked', checked);
  const notice = document.getElementById('fnCostNotice');
  if (notice) {
    const n = STATE.functions.length, cost = getFnCost();
    notice.style.display = n ? 'block' : 'none';
    notice.innerHTML = `<div class="notice info" style="margin-top:0;font-size:12px">💰 기능성 추가 비용: <strong>1개 40,000원 / 2개 65,000원</strong><br><span style="font-size:11px;color:var(--g6)">주름기능성과 미백기능성만 중복사용가능</span><br><span style="font-size:11px;color:var(--g6)">현재 ${n}개 선택 → <strong style="color:var(--t)">${N(cost)}원</strong> 추가</span></div>`;
  }
}

function selectBodyPart(name, el) {
  document.querySelectorAll('.body-grid .sel-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (name === '직접입력') {
    STATE.bodyPart = '';
    let wrapper = document.getElementById('customBodyWrapper');
    if (!wrapper) {
      wrapper = document.createElement('div'); wrapper.id = 'customBodyWrapper'; wrapper.style.cssText = 'margin-top:10px';
      wrapper.innerHTML = `<input type="text" id="customBodyInput" placeholder="사용 부위를 직접 입력하세요" style="width:100%;padding:10px 12px;border:1px solid var(--ge);border-radius:var(--rsm);font-size:14px;font-family:inherit" oninput="STATE.bodyPart=this.value.trim()">`;
      el.closest('.card').querySelector('.body-grid').after(wrapper);
    }
    setTimeout(() => document.getElementById('customBodyInput')?.focus(), 50);
  } else {
    STATE.bodyPart = name;
    const wrapper = document.getElementById('customBodyWrapper'); if (wrapper) wrapper.remove();
  }
}

function selectFormulaCategory(catId) {
  const cat = FORMULA_CATEGORIES.find(c => c.id === catId); if (!cat) return;
  const prevCat = getSelectedCategory();
  if (!prevCat || prevCat.id !== catId) { STATE.formula = null; STATE.container = null; }
  document.querySelectorAll('#formulaGrid .sel-card').forEach(c => c.classList.remove('active'));
  const cards = document.querySelectorAll('#formulaGrid .sel-card');
  const idx = FORMULA_CATEGORIES.findIndex(c => c.id === catId);
  if (cards[idx]) cards[idx].classList.add('active');
  const chips = cat.subs.map(s => `<button class="sub-chip ${STATE.formula===s.id?'active':''}" data-id="${s.id}" onclick="selectFormulaSub('${s.id}')">${s.name}</button>`).join('');
  document.getElementById('formulaSubArea').innerHTML = `<div class="formula-sub-area"><div class="formula-sub-label">${formulaIcon(cat.icon)} ${cat.name} 세부 타입을 선택하세요</div><div class="formula-sub-chips">${chips}</div></div>`;
  if (cat.subs.length === 1) selectFormulaSub(cat.subs[0].id);
  else { const btn = document.getElementById('btnNext2'); if (btn) btn.setAttribute('disabled',''); }
}

function selectFormulaSub(subId) {
  STATE.formula = subId; STATE.container = null;
  document.querySelectorAll('.sub-chip').forEach(c => c.classList.toggle('active', c.dataset.id === subId));
  const btn = document.getElementById('btnNext2'); if (btn) btn.removeAttribute('disabled');
}

function selectContainer(id) {
  STATE.container = id;
  document.querySelectorAll('.container-grid .sel-card').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const nextBtn = document.querySelector('.btn-row .btn.primary'); if (nextBtn) nextBtn.removeAttribute('disabled');
}

function toggleDelegate() {

async function goToStep(n) {
  STATE.step = n; renderProgress();
  let html = '';
  if      (n===1) html = buildStep1();
  else if (n===2) html = buildStep2();
  else if (n===3) html = buildStep5();
  else if (n===4) html = buildStep4();

  document.getElementById('progressBar').scrollIntoView({ behavior:'smooth', block:'start' });

}

async function loadAIRecommendations() {
  try { STATE.aiRecs = STATE.apiKey ? await callGemini(STATE.description) : fallbackRecommend(STATE.description); }
  catch(e) { console.warn('[AI Recommend Error]', e); STATE.aiRecs = []; }
  if (STATE.aiRecs.length < 4) {
    const fb = fallbackRecommend(STATE.description).filter(n => !STATE.aiRecs.includes(n));
    STATE.aiRecs = [...STATE.aiRecs, ...fb].slice(0, 10);
  }
  const aiEl = document.getElementById('aiSection'); if (aiEl) aiEl.innerHTML = `<div class="chips" id="aiChips">${buildAIChips()}</div>`;
}

async function submitOrder() {
  const formula = getFormula(), container = getContainer();
  const selKeys = Object.keys(STATE.selExtracts);
  const order = {
    userId:      currentUser.uid,
    userEmail:   currentUser.email,
    userName:    currentUserData.name,
    userBrand:   currentUserData.brand,
    userPhone:   currentUserData.phone,
    userAddress: currentUserData.address,
    description: STATE.description,
    functions:   [...STATE.functions],
    bodyPart:    STATE.bodyPart,
    formula:     formula ? `${formula.name} (${formula.desc})` : '-',
    extracts:    STATE.delegateExtracts ? ['제조 전문가 위임'] : selKeys,
    extractCost: getExtTotal(),
    unitCost:    getUnitCost(),
    volume:      STATE.volume,
    quantity:    STATE.quantity,
    container:   container?.name || '-',
    totalCost:   getUnitCost() * STATE.quantity,
    status:      'ordered',
    createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
  };
  try {
    await db.collection('orders').add(order);
    if (CONFIG.EMAILJS_PUBLIC_KEY && CONFIG.EMAILJS_SERVICE_ID && CONFIG.EMAILJS_TEMPLATE_ID) sendEmailJS(order);
    if (CONFIG.GOOGLE_SHEETS_URL) sendToGoogleSheets(order);
    STATE.step = 7; renderProgress();
    document.getElementById('stepContent').innerHTML = buildSuccess();
  } catch (e) { alert('발주 제출 중 오류가 발생했습니다: ' + e.message); }
}

function renderIngredientList() {
  document.getElementById('extractCount').textContent = extracts.length;
  document.getElementById('adminList').innerHTML = extracts.map(e =>
    `<div class="admin-item"><span style="flex:2;font-weight:600"><span class="cat-badge cat-${e.category||'추출물'}">${catLabel(e.category||'추출물')}</span>${e.name}</span><span style="flex:1;color:var(--g6)">${N(e.price)}원</span><span style="flex:3;font-size:11px;color:#c8cad0">${e.tags.join(', ')}</span><button class="btn-delete" onclick="deleteExtract(${e.id})">삭제</button></div>`

function addExtract() {
  const name = document.getElementById('newExtName').value.trim();
  const price = parseInt(document.getElementById('newExtPrice').value) || 0;
  const category = document.getElementById('newExtCategory').value;
  const tags = document.getElementById('newExtTags').value.split(',').map(t => t.trim()).filter(Boolean);
  if (!name || !price) { alert('성분명과 단가를 입력해주세요'); return; }
  if (extracts.find(e => e.name === name)) { alert('이미 존재하는 성분입니다'); return; }
  const id = Math.max(0, ...extracts.map(e => e.id)) + 1;
  extracts.push({ id, name, category, price, tags, inci:'' });
  saveExtracts();
  document.getElementById('newExtName').value = '';
  document.getElementById('newExtPrice').value = '';
  document.getElementById('newExtTags').value = '';
  renderIngredientList();
  alert(`✓ "${name}" 성분이 추가되었습니다`);
}
function deleteExtract(id) {
  const ext = extracts.find(x => x.id === id);
  if (!confirm(`"${ext?.name}" 성분을 삭제할까요?`)) return;
  extracts = extracts.filter(x => x.id !== id);
  saveExtracts();
  if (ext && STATE.selExtracts[ext.name] !== undefined) delete STATE.selExtracts[ext.name];
  renderIngredientList();
}
function openAdmin() { document.getElementById('adminOverlay').classList.add('open'); renderIngredientList(); }

function sendEmailJS(order) {
  if (typeof emailjs === 'undefined') return;
  emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, {
    to_email:CONFIG.SUBMIT_EMAIL, order_date:order.date||new Date().toLocaleString('ko-KR'),
    description:order.description, functions:order.functions.length?order.functions.join(' + '):'해당 없음',
    body_part:order.bodyPart, formula:order.formula, extracts:order.extracts.join(', ')||'없음',
    volume:order.volume+'ml', quantity:N(order.quantity)+'개', unit_cost:N(order.unitCost)+'원',
    total_cost:N(order.totalCost)+'원', container:order.container,
  }).then(() => console.log('[EmailJS] 전송 성공'), err => console.error('[EmailJS] 전송 실패', err));
}
function sendToGoogleSheets(order) {
  fetch(CONFIG.GOOGLE_SHEETS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ date:new Date().toLocaleString('ko-KR'), description:order.description, functions:order.functions.join(' + ')||'해당 없음', bodyPart:order.bodyPart, formula:order.formula, extracts:order.extracts.join(', ')||'없음', volume:order.volume, quantity:order.quantity, unitCost:order.unitCost, totalCost:order.totalCost, container:order.container })
  }).then(() => console.log('[Google Sheets] 전송 성공'), err => console.error('[Google Sheets] 전송 실패', err));
}
function initEmailJS() {
  if (!CONFIG.EMAILJS_PUBLIC_KEY) return;
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
  script.onload = () => emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY);
  document.head.appendChild(script);
}

function renderStatusTimeline(currentStatus) {
  const currentIdx = ORDER_STAGES.findIndex(s => s.id === currentStatus);
  return `<div class="status-timeline">${ORDER_STAGES.map((stage, i) => {
    const done = i <= currentIdx;
    const isCurrent = i === currentIdx;
    const stepClass = done && !isCurrent ? 'done' : '';
    const dotClass = isCurrent ? 'current' : (done ? 'done' : '');
    const labelClass = isCurrent ? 'current' : (done ? 'done' : '');
    return `<div class="st-step ${stepClass}"><div class="st-dot ${dotClass}">${done?'✓':(i+1)}</div><div class="st-label ${labelClass}">${stage.label}</div></div>`;
  }).join('')}</div>`;
}

function getStatusBadge(status) {
  const colors = {
    ordered:    {bg:'#FEE2E2',color:'#DC2626'},
    sample_sent:{bg:'#FEF3C7',color:'#92400E'},
    materials:  {bg:'#DBEAFE',color:'#1E40AF'},
    production: {bg:'#E0E7FF',color:'#3730A3'},
    completed:  {bg:'#D1FAE5',color:'#065F46'},
    shipped:    {bg:'#D1FAE5',color:'#065F46'},
  };
  const stage = ORDER_STAGES.find(s => s.id === status) || ORDER_STAGES[0];
  const c = colors[status] || colors.ordered;
  return `<span class="oc-badge" style="background:${c.bg};color:${c.color}">${stage.label}</span>`;
}

      document.getElementById('dashOrderList').innerHTML = `<div style="text-align:center;padding:3rem 1rem;color:var(--g6)"><div style="font-size:40px;margin-bottom:12px">📦</div><div style="font-size:14px;font-weight:600;margin-bottom:4px">아직 발주 내역이 없습니다</div><div style="font-size:12px">위의 '+ 새 발주' 버튼을 눌러 첫 발주를 시작해보세요</div></div>`;
    } else {
      document.getElementById('dashOrderList').innerHTML = orders.map(o => {
        const date = o.createdAt ? new Date(o.createdAt.seconds*1000).toLocaleDateString('ko-KR') : '-';
        return `<div class="order-card"><div class="oc-header"><div class="oc-date">${date}</div>${getStatusBadge(o.status)}</div><div class="oc-title">${o.description||'-'}</div><div class="oc-detail">${o.formula} · ${o.volume}ml × ${N(o.quantity)}개 · ${o.container}</div>${renderStatusTimeline(o.status)}</div>`;
      }).join('');
    }
  } catch(e) { console.error('Dashboard load error:', e); document.getElementById('dashOrderList').innerHTML = `<div style="color:#dc2626;font-size:12px">데이터 로드 실패: ${e.message}</div>`; }
}

// ════════════════════════════════════════════════════════════
//  👨‍💼  ADMIN DASHBOARD
// ════════════════════════════════════════════════════════════
async function showAdminScreen() {
  document.getElementById('adminScreen').style.display = 'block';
  document.getElementById('adminUserInfo').textContent = currentUserData.name + ' (관리자)';
  await renderAdminStudentList();
}

async function renderAdminStudentList() {
  document.getElementById('adminContent').innerHTML = `<div class="ai-loading"><div class="spinner"></div> 교육생 목록을 불러오는 중...</div>`;
  try {
    const snap = await db.collection('users').where('role','==','student').get();
    const students = []; snap.forEach(doc => students.push({ uid:doc.id, ...doc.data() }));

    let html = `<div style="font-size:18px;font-weight:700;margin-bottom:16px">교육생 관리 (${students.length}명)</div>`;
    if (students.length === 0) {
      html += `<div style="text-align:center;padding:2rem;color:var(--g6)">등록된 교육생이 없습니다</div>`;
    } else {
      html += students.map(s => {
        const safeName = (s.name||'').replace(/'/g,"\\'");
        const safeBrand = (s.brand||'').replace(/'/g,"\\'");
        return `<div class="admin-student-card" onclick="showStudentOrders('${s.uid}','${safeName}','${safeBrand}')"><div><div class="asc-name">${s.name} · ${s.brand}</div><div class="asc-email">${s.email} · ${s.phone||'-'}</div></div><div style="color:var(--g6);font-size:18px">→</div></div>`;
      }).join('');
    }
    document.getElementById('adminContent').innerHTML = html;
  } catch(e) { document.getElementById('adminContent').innerHTML = `<div style="color:#dc2626">오류: ${e.message}</div>`; }
}

async function showStudentOrders(uid, name, brand) {
  document.getElementById('adminContent').innerHTML = `<div class="ai-loading"><div class="spinner"></div> 발주 내역을 불러오는 중...</div>`;
  try {
    const snap = await db.collection('orders').where('userId','==',uid).get();
    const orders = []; snap.forEach(doc => orders.push({ id:doc.id, ...doc.data() }));
    orders.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

    let html = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><button class="btn-sm" onclick="renderAdminStudentList()">← 목록</button><div><div style="font-size:18px;font-weight:700">${name}</div><div style="font-size:12px;color:var(--g6)">${brand} · 발주 ${orders.length}건</div></div></div>`;

    if (orders.length === 0) {
      html += `<div style="text-align:center;padding:2rem;color:var(--g6)">발주 내역이 없습니다</div>`;
    } else {
      html += orders.map(o => {
        const date = o.createdAt ? new Date(o.createdAt.seconds*1000).toLocaleDateString('ko-KR') : '-';
        const currentIdx = ORDER_STAGES.findIndex(s => s.id === o.status);
        const nextStage = currentIdx < ORDER_STAGES.length-1 ? ORDER_STAGES[currentIdx+1] : null;
        const prevStage = currentIdx > 0 ? ORDER_STAGES[currentIdx-1] : null;
        const safeArgs = `'${o.id}','${uid}','${name.replace(/'/g,"\\'")}','${brand.replace(/'/g,"\\'")}'`;
        let actions = '<div class="status-actions">';
        if (prevStage) actions += `<button class="status-btn prev" onclick="updateOrderStatus(${safeArgs},'${prevStage.id}')">← ${prevStage.label}</button>`;
        if (nextStage) actions += `<button class="status-btn next" onclick="updateOrderStatus(${safeArgs},'${nextStage.id}')">→ ${nextStage.label}</button>`;
        actions += '</div>';
        return `<div class="order-card"><div class="oc-header"><div class="oc-date">${date}</div>${getStatusBadge(o.status)}</div><div class="oc-title">${o.description||'-'}</div><div class="oc-detail">${o.formula} · ${o.volume}ml × ${N(o.quantity)}개 · ${o.container}<br>원료: ${o.extracts?o.extracts.join(', '):'없음'}</div>${renderStatusTimeline(o.status)}${actions}</div>`;
      }).join('');
    }
    document.getElementById('adminContent').innerHTML = html;
  } catch(e) { document.getElementById('adminContent').innerHTML = `<div style="color:#dc2626">오류: ${e.message}</div>`; }
}

async function updateOrderStatus(orderId, uid, name, brand, newStatus) {
  try {
    await db.collection('orders').doc(orderId).update({ status: newStatus, statusUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    await showStudentOrders(uid, name, brand);
  } catch(e) { alert('상태 변경 실패: ' + e.message); }
}

// ════════════════════════════════════════════════════════════
//  🧭  NAVIGATION
// ════════════════════════════════════════════════════════════
function startNewOrder() {
  Object.assign(STATE, {
    step:1, description:'', functions:[], bodyPart:'',
    formula:null, delegateExtracts:false, selExtracts:{}, aiRecs:[], volume:100, quantity:300, container:null
  });
  STATE.userName = currentUserData.name;
  STATE.userBrand = currentUserData.brand;
  STATE.userPhone = currentUserData.phone;
  STATE.userAddress = currentUserData.address;
  STATE.apiKey = CONFIG.GEMINI_API_KEY || '';

  document.getElementById('dashboardScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';

  if (currentUserData.role === 'admin') document.getElementById('mainApp').classList.add('admin-mode');
  else document.getElementById('mainApp').classList.remove('admin-mode');

  initEmailJS();
  goToStep(1);
}

function goToDashboard() {
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('dashboardScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'none';
  if (currentUserData.role === 'admin') showAdminScreen();
  else showDashboard();
}

function goHome() { goToDashboard(); }

// ════════════════════════════════════════════════════════════
//  🚀  AUTH STATE LISTENER (LAUNCH)
// ════════════════════════════════════════════════════════════
auth.onAuthStateChanged(async (user) => {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboardScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'none';

  if (user) {
    currentUser = user;
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      if (doc.exists) {
        currentUserData = doc.data();
      } else {
        currentUserData = { email:user.email, name:user.email.split('@')[0], brand:'', phone:'', address:'', role:'student' };
        await db.collection('users').doc(user.uid).set({ ...currentUserData, createdAt:firebase.firestore.FieldValue.serverTimestamp() });
      }
      if (currentUserData.role === 'admin') showAdminScreen();
      else showDashboard();
    } catch(e) {
      console.error('Auth state error:', e);
      alert('사용자 정보를 불러올 수 없습니다. 다시 로그인해주세요.');
      auth.signOut();
    }
  } else {
    currentUser = null; currentUserData = null;
    document.getElementById('loginScreen').style.display = 'flex';
    // Reset login form state
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('signupBtn').disabled = false;
    document.getElementById('adminSignupBtn').disabled = false;
  }
});

</script>
